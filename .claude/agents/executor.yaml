  "estimated_token_savings": ""
}
```

---

## Failure Behaviour

If execution_plan.json cannot be written:
- Print error to orchestrator
- Orchestrator falls back to default full pipeline
- All agents run in default order with no grouping

---

## Rules You Must Follow

- Never skip architect, backend, devops, or qa
- Never generate application code
- Always write execution_plan.json before exiting
- Always provide a reason for every skipped agent
- Always list which MCP tools each agent will use
- Keep token estimates realistic — do not underestimate
